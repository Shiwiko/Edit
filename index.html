<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargeur de Dossier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 50px; }
        .container { background: #161b22; padding: 20px; border-radius: 10px; display: inline-block; }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #238636; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #1b4721; }
        #status { margin-top: 15px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 Créateur de Dossier ZIP</h1>
        <p>Colle les liens des fichiers (un par ligne) :</p>
        <textarea id="links" rows="10" style="width: 100%; border-radius: 5px;"></textarea>
        <br>
        <button id="downloadBtn">Générer le Dossier (.zip)</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            const status = document.getElementById('status');
            const links = document.getElementById('links').value.split('\n').filter(l => l.trim() !== '');
            
            if (links.length === 0) return alert("Ajoute au moins un lien !");

            btn.disabled = true;
            status.innerText = "Préparation du dossier...";
            const zip = new JSZip();

            try {
                for (let i = 0; i < links.length; i++) {
                    const url = links[i].trim();
                    status.innerText = `Téléchargement du fichier ${i + 1}/${links.length}...`;
                    
                    const response = await fetch(url);
                    const blob = await response.blob();
                    
                    // On extrait le nom du fichier depuis l'URL
                    const fileName = url.split('/').pop() || `fichier_${i+1}`;
                    zip.file(fileName, blob);
                }

                status.innerText = "Compression en cours...";
                const content = await zip.generateAsync({ type: "blob" });
                
                // Création du lien de téléchargement
                const link = document.createElement("a");
                link.href = URL.createObjectURL(content);
                link.download = "Mon_Dossier.zip";
                link.click();

                status.innerText = "✅ Terminé !";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ Erreur (vérifie les liens ou les droits CORS)";
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
