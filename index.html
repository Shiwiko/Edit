<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Express Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #58a6ff;
            --success: #3fb950;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #c9d1d9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { color: white; margin-bottom: 0.5rem; font-size: 1.8rem; }
        p { color: #8b949e; margin-bottom: 2rem; }

        .upload-zone {
            border: 2px dashed var(--border);
            padding: 40px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            position: relative;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(88, 166, 255, 0.05);
        }

        .upload-zone i { font-size: 3rem; color: var(--primary); display: block; margin-bottom: 1rem; }

        input[type="file"] { display: none; }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
        }

        .preview-item {
            width: 60px;
            height: 60px;
            background: var(--border);
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--primary);
        }

        .stats { margin: 1.5rem 0; font-size: 0.9rem; font-weight: bold; }

        .progress-container {
            width: 100%;
            background: var(--border);
            height: 8px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .actions { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        #downloadBtn { background: var(--primary); color: white; }
        #downloadBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        #resetBtn { background: transparent; border: 1px solid #f85149; color: #f85149; }

        #status { margin-top: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📦 Pack Express Pro</h1>
        <p>Glisse tes fichiers pour créer un ZIP</p>

        <label for="fileInput" class="upload-zone" id="dropZone">
            <span style="font-size: 40px;">📁</span>
            <div style="margin-top:10px">Clique ou glisse tes photos</div>
            <input type="file" id="fileInput" multiple accept="image/*,video/*">
        </label>

        <div id="preview-container"></div>

        <div class="stats" id="fileInfo">Aucun fichier</div>

        <div class="progress-container" id="pBox">
            <div id="progress-bar"></div>
        </div>

        <div id="status"></div>

        <div class="actions">
            <button id="resetBtn">Vider</button>
            <button id="downloadBtn" disabled>Générer ZIP</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview-container');
        const fileInfo = document.getElementById('fileInfo');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressBar = document.getElementById('progress-bar');
        const pBox = document.getElementById('pBox');
        const status = document.getElementById('status');

        fileInput.addEventListener('change', handleFiles);

        function handleFiles() {
            const files = fileInput.files;
            preview.innerHTML = '';
            
            if (files.length > 0) {
                fileInfo.innerText = `${files.length} fichier(s) sélectionné(s)`;
                downloadBtn.disabled = false;

                Array.from(files).slice(0, 20).forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.className = 'preview-item';
                            preview.appendChild(img);
                        }
                        reader.readAsDataURL(file);
                    }
                });
                if(files.length > 20) {
                    const more = document.createElement('div');
                    more.innerText = `+${files.length - 20}`;
                    more.style.alignSelf = 'center';
                    preview.appendChild(more);
                }
            } else {
                resetAll();
            }
        }

        downloadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            const zip = new JSZip();
            
            downloadBtn.disabled = true;
            pBox.style.display = 'block';
            status.innerText = "Compression en cours...";

            for (let i = 0; i < files.length; i++) {
                zip.file(files[i].name, files[i]);
                let percent = Math.round(((i + 1) / files.length) * 100);
                progressBar.style.width = percent + '%';
            }

            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `Pack_${Date.now()}.zip`;
            link.click();

            status.innerHTML = "<span style='color:var(--success)'>✅ Archivage terminé !</span>";
            downloadBtn.disabled = false;
        });

        resetBtn.addEventListener('click', resetAll);

        function resetAll() {
            fileInput.value = '';
            preview.innerHTML = '';
            fileInfo.innerText = 'Aucun fichier';
            downloadBtn.disabled = true;
            pBox.style.display = 'none';
            progressBar.style.width = '0%';
            status.innerText = '';
        }
    </script>
</body>
</html>
